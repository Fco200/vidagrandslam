<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisos Oficiales - VIDA GRAND SLAM</title>
    <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --primary-neon: #7fff00;
            --accent-green: #4db800;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 50%, var(--primary-neon) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; font-style: italic; }

        .aviso-card {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-left: 5px solid var(--primary-neon);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .aviso-card .fecha {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .aviso-card .titulo {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-neon);
            margin-bottom: 10px;
        }

        .aviso-card .mensaje {
            font-size: 15px;
            line-height: 1.6;
            color: #ddd;
            white-space: pre-wrap;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--primary-neon);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Avisos Oficiales</h1>
        <p>VIDA GRAND SLAM — Comunicados y Noticias del Torneo</p>
    </header>

    <div id="avisosContainer">
        <div class="no-data">Cargando avisos desde la nube...</div>
    </div>

    <a href="index.html" class="back-link">⬅ Volver al Inicio</a>
</div>

<script>
    const firebaseAvisosURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/avisos.json';

    function cargarAvisos() {
        const container = document.getElementById('avisosContainer');

        fetch(firebaseAvisosURL)
        .then(res => res.json())
        .then(data => {
            if (!data) {
                container.innerHTML = '<div class="no-data">No hay avisos publicados hasta el momento.</div>';
                return;
            }

            const lista = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            lista.sort((a, b) => b.fecha.localeCompare(a.fecha) || b.id - a.id);

            container.innerHTML = '';
            lista.forEach(aviso => {
                const card = document.createElement('div');
                card.className = 'aviso-card';
                const fechaFormateada = aviso.fecha.split('-').reverse().join('/');
                card.innerHTML = `
                    <div class="fecha">🗓 ${fechaFormateada}</div>
                    <div class="titulo">${aviso.titulo}</div>
                    <div class="mensaje">${aviso.mensaje}</div>
                `;
                container.appendChild(card);
            });
        })
        .catch(() => {
            container.innerHTML = '<div class="no-data" style="color: #ba1a1a;">Error al conectar con el servidor.</div>';
        });
    }

    setInterval(cargarAvisos, 45000);
    cargarAvisos();
</script>
</body>
</html>

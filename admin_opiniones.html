<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Auditoría de Opiniones - VIDA GRAND SLAM</title>
   <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --primary-color: #1a472a; 
            --secondary-color: #d4af37; 
            --dark-bg: #111612;
            --card-bg: #1c221d;
            --text-light: #f4f7f5;
            --lime-neon: #7fff00;
            --accent-blue: #0b5ed7;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0a2211 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 5px solid var(--secondary-color);
            box-shadow: var(--card-shadow);
        }

        header h1 { margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary-color); }
        header p { margin: 6px 0 0 0; font-style: italic; color: #cbd6cf; }

        .container { max-width: 1000px; margin: 0 auto; }

        .btn-back {
            background-color: #334139;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 25px;
            transition: background 0.2s;
        }
        .btn-back:hover { background-color: var(--primary-color); }

        /* Cuadro de Métricas */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .metric-card {
            background-color: #232c25;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: var(--card-shadow);
        }
        .metric-card .value { font-size: 32px; font-weight: bold; color: var(--secondary-color); margin-bottom: 5px; }
        .metric-card .label { font-size: 11px; text-transform: uppercase; color: #aaa; font-weight: bold; }

        /* Filtros */
        .filter-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-box label { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #8a968f; }
        .filter-box select {
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Lista de Mensajes */
        .opinion-list { display: flex; flex-direction: column; gap: 15px; }
        
        .opinion-row {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: var(--card-shadow);
            border-left: 5px solid #64748b;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Bordes dinámicos según el tipo */
        .opinion-row.type-sugerencia { border-left-color: var(--accent-blue); }
        .opinion-row.type-felicitación { border-left-color: var(--lime-neon); }
        .opinion-row.type-queja { border-left-color: #ba1a1a; }

        .opinion-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info { font-weight: bold; font-size: 16px; color: #fff; }
        .user-info span { font-size: 12px; color: #888; font-weight: normal; display: block; margin-top: 2px; }
        
        .badge-type {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            background-color: #2a2a2a;
        }
        .type-sugerencia .badge-type { background-color: rgba(11, 94, 215, 0.2); color: #3986f7; }
        .type-felicitación .badge-type { background-color: rgba(127, 255, 0, 0.15); color: var(--lime-neon); }
        .type-queja .badge-type { background-color: rgba(186, 26, 26, 0.2); color: #ff6b6b; }

        .stars-val { color: var(--secondary-color); font-size: 16px; font-weight: bold; letter-spacing: 2px; }

        .opinion-body {
            font-size: 14.5px;
            line-height: 1.5;
            color: #cbd6cf;
            white-space: pre-wrap;
        }

        /* Créditos FV */
        .developer-credits-box {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .fv-logo-placeholder {
            width: 50px;
            height: 50px;
            background-color: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
            overflow: hidden;
        }
        .fv-logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .developer-text { font-size: 12px; color: #666; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
        .developer-text span { color: var(--lime-neon); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Panel de Auditoría de Opiniones</h1>
        <p>Bandeja de Entrada Administrativa • Torneo VIDA GRAND SLAM</p>
    </header>

    <a href="admin.html" class="btn-back">← Volver al Panel Admi</a>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="value" id="valTotalMensajes">0</div>
            <div class="label">Mensajes Recibidos</div>
        </div>
        <div class="metric-card">
            <div class="value" id="valPromedioStars">0.0 ★</div>
            <div class="label">Calificación Web Promedio</div>
        </div>
    </div>

    <div class="filter-box">
        <label for="selectFilterTipo">Filtrar Categoría:</label>
        <select id="selectFilterTipo" onchange="filtrarYDesplegarOpiniones()">
            <option value="">-- Ver Todas --</option>
            <option value="Sugerencia">💡 Sugerencias</option>
            <option value="Felicitación">🎉 Felicitaciones</option>
            <option value="Queja">⚠️ Quejas</option>
            <option value="Otro">💬 Otros</option>
        </select>
    </div>

    <div id="opinionesMainContainer" class="opinion-list">
        <p style="text-align:center; color:#888; font-style:italic;">Cargando mensajes del servidor...</p>
    </div>

    <div class="developer-credits-box">
        <div class="fv-logo-placeholder">
            <img src="fv_digital_logo.png.webp" alt="FV" onerror="this.style.display='none'">
            FV
        </div>
        <div class="developer-text">Desarrollado de forma oficial por <span>FV DIGITAL</span></div>
    </div>
</div>

<script>
    const firebaseOpinionesURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/torneo/opiniones.json';
    let cacheOpinionesRaw = [];

    function descargarOpiniones() {
        fetch(firebaseOpinionesURL)
        .then(res => res.json())
        .then(data => {
            cacheOpinionesRaw = [];
            if (data) {
                // Firebase guarda los objetos POST con llaves aleatorias únicas; los convertimos a un arreglo legible
                Object.keys(data).forEach(key => {
                    if (data[key]) cacheOpinionesRaw.push(data[key]);
                });
                
                // Ordenar de forma cronológica inversa (los más recientes aparecen al principio)
                cacheOpinionesRaw.sort((a, b) => b.id - a.id);
            }
            
            calcularYDesplegarMetricas();
            filtrarYDesplegarOpiniones();
        })
        .catch(err => {
            console.error("Error leyendo opiniones:", err);
            document.getElementById('opinionesMainContainer').innerHTML = '<p style="text-align:center; color:#ff6b6b;">Error al enlazar con el nodo de opiniones.</p>';
        });
    }

    function calcularYDesplegarMetricas() {
        const total = cacheOpinionesRaw.length;
        document.getElementById('valTotalMensajes').textContent = total;

        if (total === 0) {
            document.getElementById('valPromedioStars').textContent = "0.0 ★";
            return;
        }

        // Sumar todas las calificaciones registradas para sacar la media aritmética
        let sumaStars = 0;
        cacheOpinionesRaw.forEach(op => {
            sumaStars += (parseInt(op.calificacionStars) || 0);
        });

        const promedio = (sumaStars / total).toFixed(1);
        document.getElementById('valPromedioStars').textContent = `${promedio} / 5.0 ★`;
    }

    function filtrarYDesplegarOpiniones() {
        const contenedor = document.getElementById('opinionesMainContainer');
        const filtroTipo = document.getElementById('selectFilterTipo').value;

        // Aplicar el filtro de categoría si está seleccionado
        let filtradas = cacheOpinionesRaw;
        if (filtroTipo !== "") {
            filtradas = cacheOpinionesRaw.filter(op => op.tipo === filtroTipo);
        }

        if (filtradas.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#666; padding:30px; font-style:italic;">No hay comentarios registrados en esta categoría.</p>';
            return;
        }

        contenedor.innerHTML = '';
        filtradas.forEach(op => {
            const div = document.createElement('div');
            // Formatear clase CSS limpiando acentos para compatibilidad
            const claseTipoClean = (op.tipo || 'otro').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            div.className = `opinion-row type-${claseTipoClean}`;

            // Generar string visual de estrellas doradas
            const numStars = parseInt(op.calificacionStars) || 0;
            const estrellasHtml = '★'.repeat(numStars) + '☆'.repeat(5 - numStars);

            div.innerHTML = `
                <div class="opinion-header">
                    <div class="user-info">
                        ${op.nombre}
                        <span>📅 ${op.fecha || 'Fecha no registrada'}</span>
                    </div>
                    <div>
                        <span class="badge-type">${op.tipo}</span>
                        <div class="stars-val">${estrellasHtml}</div>
                    </div>
                </div>
                <div class="opinion-body">${op.mensaje}</div>
            `;
            contenedor.appendChild(div);
        });
    }

    // Inicializar descarga
    descargarOpiniones();
</script>
</body>
</html>

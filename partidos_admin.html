<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación de Partidos - Admin</title>
    <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --primary-neon: #7fff00;
            --accent-green: #4db800;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --danger: #ba1a1a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-neon);
            padding-bottom: 10px;
        }

        h1 { color: #fff; text-transform: uppercase; letter-spacing: 1px; margin: 0; font-size: 24px; }
        header p { color: var(--primary-neon); margin: 5px 0 0 0; font-size: 14px; font-weight: bold; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        h2 { font-size: 18px; text-transform: uppercase; color: #fff; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 1; }
        @media (min-width: 600px) { .form-group.full-width { grid-column: span 2; } }

        label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); font-weight: bold; margin-bottom: 6px; }
        input, select {
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus { border-color: var(--primary-neon); outline: none; }

        button {
            background: linear-gradient(180deg, var(--primary-neon) 0%, var(--accent-green) 100%);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.01); box-shadow: 0 0 10px var(--primary-neon); }

        .admin-btn {
            color: var(--primary-neon);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Lista de partidos agendados */
        .match-item {
            background: #1c1c1c;
            border-left: 4px solid var(--primary-neon);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-details { font-size: 14px; }
        .match-teams { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #fff; }
        .match-info { color: var(--text-muted); font-size: 13px; }
        .match-info span { color: var(--primary-neon); }

        .btn-delete {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            margin: 0;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover { background: #931414; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="admin-btn">Volver al Inicio</a>
        <h1>Programador de Rol de Juegos</h1>
        <p>VIDA GRAND SLAM — Panel de Administración</p>
    </header>

    <div class="card">
        <h2>Programar Nuevo Encuentro</h2>
        <form id="gameForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="teamHome">Equipo Local (CASA)</label>
                    <select id="teamHome" required></select>
                </div>
                <div class="form-group">
                    <label for="teamAway">Equipo Visitante</label>
                    <select id="teamAway" required></select>
                </div>
                <div class="form-group">
                    <label for="gameDate">Fecha del Juego</label>
                    <input type="date" id="gameDate" required>
                </div>
                <div class="form-group">
                    <label for="gameTime">Hora del Juego</label>
                    <select id="gameTime" required>
                        <option value="19:00">07:00 PM</option>
                        <option value="20:30">08:30 PM</option>
                        <option value="22:00">10:00 PM</option>
                        <option value="23:00">11:00 PM (Opción Extra)</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="gameField">Campo / Sede</label>
                    <select id="gameField" onchange="verificarOtroCampo(this)" required>
                        <option value="CAMPO VIDA SAHUARO">CAMPO VIDA SAHUARO</option>
                        <option value="OTRO">Otro campo...</option>
                    </select>
                    <input type="text" id="otroCampoInput" placeholder="Escribe el nombre del otro campo" style="display:none; margin-top:10px;">
                </div>
            </div>
            <button type="submit">Publicar Juego</button>
        </form>
    </div>

    <div class="card">
        <h2>Juegos Programados en la Base de Datos</h2>
        <div id="adminGamesContainer">
            <p style="color: var(--text-muted); font-style: italic; text-align: center;">Cargando calendario...</p>
        </div>
    </div>
</div>

<script>
    const firebasePartidosURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/partidos.json';
    const gameForm = document.getElementById('gameForm');
    const adminGamesContainer = document.getElementById('adminGamesContainer');
    
    // LISTA AUTOMÁTICA DE EQUIPOS
    const listaEquipos = [
        "YAQUESITAS","NOBAS","COW GIRLS","WILD ANGELS","ALBOROTADAS","COQUETAS",
        "KLAN SIQUEIROS","PAPAS DEL MEMO"
    ];

    let juegosDatabase = [];

    // Función para llenar los selectores de equipos de forma automática
    function inicializarEquipos() {
        const homeSelect = document.getElementById('teamHome');
        const awaySelect = document.getElementById('teamAway');
        
        let opciones = '<option value="" disabled selected>-- Seleccionar --</option>';
        listaEquipos.forEach(equipo => {
            opciones += `<option value="${equipo}">${equipo}</option>`;
        });
        
        homeSelect.innerHTML = opciones;
        awaySelect.innerHTML = opciones;
    }

    // Muestra el input de texto únicamente si se selecciona "Otro campo..."
    function verificarOtroCampo(selectElement) {
        const otroInput = document.getElementById('otroCampoInput');
        if (selectElement.value === 'OTRO') {
            otroInput.style.display = 'block';
            otroInput.required = true;
        } else {
            otroInput.style.display = 'none';
            otroInput.required = false;
            otroInput.value = '';
        }
    }

    // Descargar juegos existentes
    function cargarJuegos() {
        fetch(firebasePartidosURL)
        .then(res => res.json())
        .then(data => {
            juegosDatabase = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            juegosDatabase.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
            renderAdminGames();
        })
        .catch(() => {
            adminGamesContainer.innerHTML = '<p style="color: red;">Error al conectar con Firebase.</p>';
        });
    }

    // Registrar nuevo juego
    gameForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const homeTeam = document.getElementById('teamHome').value;
        const awayTeam = document.getElementById('teamAway').value;

        if (homeTeam === awayTeam) {
            alert("¡Error! Un equipo no puede jugar contra sí mismo.");
            return;
        }

        // Determinar qué valor de campo se enviará
        let campoFinal = document.getElementById('gameField').value;
        if (campoFinal === 'OTRO') {
            campoFinal = document.getElementById('otroCampoInput').value.trim();
        }

        const nuevoJuego = {
            home: homeTeam,
            away: awayTeam,
            date: document.getElementById('gameDate').value,
            time: document.getElementById('gameTime').value,
            field: campoFinal
        };

        fetch(firebasePartidosURL, {
            method: 'POST',
            body: JSON.stringify(nuevoJuego)
        })
        .then(() => {
            gameForm.reset();
            document.getElementById('otroCampoInput').style.display = 'none';
            cargarJuegos();
        });
    });

    // Dibujar los juegos en el panel administrador
    function renderAdminGames() {
        if (juegosDatabase.length === 0) {
            adminGamesContainer.innerHTML = '<p style="color: #666; font-style: italic; text-align: center;">No hay juegos agendados.</p>';
            return;
        }

        adminGamesContainer.innerHTML = '';
        juegosDatabase.forEach(juego => {
            const [year, month, day] = juego.date.split('-');
            const fechaFormateada = `${day}/${month}/${year}`;

            const div = document.createElement('div');
            div.className = 'match-item';
            div.innerHTML = `
                <div class="match-details">
                    <div class="match-teams">${juego.home} <span style="color:var(--primary-neon)">VS</span> ${juego.away}</div>
                    <div class="match-info">🗓️ <span>${fechaFormateada}</span> | ⏰ <span>${juego.time} Hrs</span> | 📍 <span>${juego.field}</span></div>
                </div>
                <button onclick="eliminarJuego('${juego.id}')" class="btn-delete">Eliminar</button>
            `;
            adminGamesContainer.appendChild(div);
        });
    }

    // Eliminar juego de la nube
    function eliminarJuego(id) {
        if(confirm("¿Seguro que deseas cancelar o eliminar este partido programado?")) {
            fetch(`https://vidagrandslam-default-rtdb.firebaseio.com/partidos/${id}.json`, {
                method: 'DELETE'
            })
            .then(() => {
                cargarJuegos();
            });
        }
    }

    // Inicializar la página cargando los equipos y los juegos guardados
    window.onload = function() {
        inicializarEquipos();
        cargarJuegos();
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - VIDA GRAND SLAM</title>
    <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --primary-neon: #7fff00;
            --accent-green: #4db800;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --danger: #ba1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(127, 255, 0, 0.3);
            margin: 0 auto 20px;
            display: block;
        }

        h2 {
            color: var(--text-light);
            margin-bottom: 5px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: #0d0d0d;
            border: 2px solid #333;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            color: var(--text-light);
        }

        select option {
            background-color: var(--card-bg);
            color: var(--text-light);
        }

        select:focus, input:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 8px rgba(127, 255, 0, 0.2);
        }

        .attempts-counter {
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, var(--primary-neon) 0%, var(--accent-green) 100%);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(127, 255, 0, 0.3);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-neon);
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .back-link:hover { text-decoration: underline; }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .alert-error {
            background-color: #2c1010;
            color: #ff6b6b;
            border: 1px solid #441515;
        }

        .alert-success {
            background-color: #0f2b0f;
            color: var(--primary-neon);
            border: 1px solid #1f4d1f;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="IMAGEN LOGO VIDA GRAN SLAM.jfif" alt="Logo" class="login-logo">

        <h2>Acceso Privado</h2>
        <p class="subtitle">Torneo VIDA GRAND SLAM</p>

        <div id="alertError" class="alert alert-error"></div>
        <div id="alertSuccess" class="alert alert-success"></div>

        <form id="loginForm" onsubmit="validarAcceso(event)">
            <div class="form-group">
                <label for="usuario">Selecciona tu Usuario:</label>
                <select id="usuario" required>
                    <option value="" disabled selected>-- Seleccionar --</option>
                    <option value="FCO">FCO</option>
                    <option value="YASSEL">YASSEL</option>
                    <option value="JARY">JARY</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Ingresa tu clave" required>
            </div>

            <div id="attemptsText" class="attempts-counter">
                Intentos restantes: <span id="attemptsLeft">3</span>
            </div>

            <button type="submit" class="btn-submit">Ingresar al Sistema</button>
        </form>

        <a href="index.html" class="back-link">⬅ Volver al Inicio</a>
    </div>

    <script>
        const usuariosValidos = {
            "FCO": "FcoSlam2026*",
            "YASSEL": "YasselPresidenta26*",
            "JARY": "JaryAdmin2026*"
        };

        let intentosMaximos = 3;
        let intentosRealizados = 0;

        function validarAcceso(event) {
            event.preventDefault();

            const userSelect = document.getElementById("usuario").value;
            const passInput = document.getElementById("password").value;
            const errorDiv = document.getElementById("alertError");
            const successDiv = document.getElementById("alertSuccess");
            const attemptsDiv = document.getElementById("attemptsText");
            const attemptsLeftSpan = document.getElementById("attemptsLeft");

            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            if (usuariosValidos[userSelect] && usuariosValidos[userSelect] === passInput) {
                successDiv.innerText = `¡Acceso concedido! Bienvenido(a) ${userSelect}. Redirigiendo...`;
                successDiv.style.display = "block";
                document.getElementById("loginForm").reset();
                
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 1500);

            } else {
                intentosRealizados++;
                let restantes = intentosMaximos - intentosRealizados;

                if (restantes <= 0) {
                    errorDiv.innerText = "Has agotado los 3 intentos. Redirigiendo al inicio...";
                    errorDiv.style.display = "block";
                    attemptsDiv.style.display = "none";
                    
                    document.getElementById("usuario").disabled = true;
                    document.getElementById("password").disabled = true;
                    document.querySelector(".btn-submit").disabled = true;

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    errorDiv.innerText = "Usuario o contraseña incorrectos. Intenta de nuevo.";
                    errorDiv.style.display = "block";
                    
                    attemptsDiv.style.display = "block";
                    attemptsLeftSpan.innerText = restantes;
                    
                    document.getElementById("password").value = "";
                }
            }
        }
    </script>
</body>
</html>

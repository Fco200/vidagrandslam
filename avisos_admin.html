<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Avisos - VIDA GRAND SLAM</title>
    <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --primary-neon: #7fff00;
            --accent-green: #4db800;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --danger: #ba1a1a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-neon);
            padding-bottom: 10px;
        }

        h1 { color: #fff; text-transform: uppercase; letter-spacing: 1px; margin: 0; font-size: 22px; }
        header p { color: var(--primary-neon); margin: 5px 0 0 0; font-size: 13px; font-weight: bold; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .card h2 { font-size: 18px; text-transform: uppercase; color: #fff; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; text-transform: uppercase; color: var(--text-muted); font-weight: bold; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-neon); outline: none; }
        .form-group textarea { resize: vertical; min-height: 100px; }

        button {
            background: linear-gradient(180deg, var(--primary-neon) 0%, var(--accent-green) 100%);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { box-shadow: 0 0 10px rgba(127, 255, 0, 0.3); }

        .aviso-item {
            background: #1c1c1c;
            border-left: 4px solid var(--primary-neon);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .aviso-item .fecha { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .aviso-item .titulo { font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0; }
        .aviso-item .mensaje { font-size: 13px; color: #aaa; white-space: pre-wrap; margin-bottom: 10px; }
        .btn-delete {
            background: var(--danger);
            color: white;
            padding: 5px 12px;
            font-size: 12px;
            width: auto;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-delete:hover { background: #931414; }

        .admin-btn {
            color: var(--primary-neon);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="admin.html" class="admin-btn">⬅ Volver al Panel</a>
        <h1>Administrar Avisos</h1>
        <p>VIDA GRAND SLAM — Publica Comunicados para el Público</p>
    </header>

    <div class="card">
        <h2>Publicar Nuevo Aviso</h2>
        <form id="avisoForm">
            <div class="form-group">
                <label for="titulo">Título del Aviso</label>
                <input type="text" id="titulo" placeholder="Ej. Suspensión de Jornada" required>
            </div>
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje / Contenido</label>
                <textarea id="mensaje" placeholder="Escribe el aviso aquí..." required></textarea>
            </div>
            <button type="submit">Publicar Aviso</button>
        </form>
    </div>

    <div class="card">
        <h2>Avisos Publicados</h2>
        <div id="listaAvisos">
            <p style="color: var(--text-muted); text-align: center; font-style: italic;">Cargando avisos...</p>
        </div>
    </div>
</div>

<script>
    const firebaseAvisosURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/avisos.json';

    document.getElementById('avisoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const titulo = document.getElementById('titulo').value.trim();
        const fecha = document.getElementById('fecha').value;
        const mensaje = document.getElementById('mensaje').value.trim();

        if (!titulo || !fecha || !mensaje) return alert("Completa todos los campos.");

        const aviso = { titulo, fecha, mensaje };

        fetch(firebaseAvisosURL, { method: 'POST', body: JSON.stringify(aviso) })
        .then(() => {
            document.getElementById('avisoForm').reset();
            cargarAvisos();
            alert("¡Aviso publicado con éxito!");
        })
        .catch(() => alert("Error al publicar el aviso."));
    });

    function cargarAvisos() {
        fetch(firebaseAvisosURL)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('listaAvisos');
            if (!data) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; font-style: italic;">No hay avisos publicados.</p>';
                return;
            }

            const lista = Object.keys(data).reverse().map(key => ({ id: key, ...data[key] }));
            container.innerHTML = '';
            lista.forEach(aviso => {
                const div = document.createElement('div');
                div.className = 'aviso-item';
                const fechaF = aviso.fecha.split('-').reverse().join('/');
                div.innerHTML = `
                    <div class="fecha">🗓 ${fechaF}</div>
                    <div class="titulo">${aviso.titulo}</div>
                    <div class="mensaje">${aviso.mensaje}</div>
                    <button onclick="eliminarAviso('${aviso.id}')" class="btn-delete">Eliminar</button>
                `;
                container.appendChild(div);
            });
        });
    }

    function eliminarAviso(id) {
        if (confirm("¿Seguro que deseas eliminar este aviso?")) {
            fetch(`https://vidagrandslam-default-rtdb.firebaseio.com/avisos/${id}.json`, { method: 'DELETE' })
            .then(() => cargarAvisos());
        }
    }

    cargarAvisos();
</script>
</body>
</html>

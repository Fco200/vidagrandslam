<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Resultados - Admin</title>
    <link rel="icon" type="image/jfif" href="IMAGEN LOGO VIDA GRAN SLAM.jfif">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --primary-neon: #7fff00;
            --accent-green: #4db800;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --danger: #ba1a1a;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary-neon); padding-bottom: 10px; }
        h1 { color: #fff; text-transform: uppercase; margin: 0; font-size: 22px; }
        .card { background-color: var(--card-bg); border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .row { display: grid; grid-template-columns: 1fr 80px 40px 80px 1fr; gap: 10px; align-items: center; margin-bottom: 15px; }
        select, input { background-color: #0d0d0d; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; font-size: 14px; text-align: center; }
        select { text-align-last: center; }
        input:disabled, select:disabled { background-color: #222; color: #888; border-color: #444; }
        /* Estilo visual para resaltar que Jornada y Fecha ya se pueden editar */
        .editable-field { border-color: #555; background-color: #111; }
        .editable-field:focus { border-color: var(--primary-neon); }
        label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: bold; text-align: center; margin-bottom: 5px; }
        button { background: linear-gradient(180deg, var(--primary-neon) 0%, var(--accent-green) 100%); color: #000; border: none; padding: 12px; font-weight: bold; text-transform: uppercase; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { transform: scale(1.01); box-shadow: 0 0 10px var(--primary-neon); }
        .match-item { background: #1c1c1c; padding: 12px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-delete { background: var(--danger); color: white; padding: 5px 10px; font-size: 11px; width: auto; border: none; border-radius: 4px; cursor: pointer; }
        
        .selector-juego-group { display: flex; flex-direction: column; margin-bottom: 20px; border-bottom: 1px dashed #333; padding-bottom: 20px; }
        .selector-juego-group select { background-color: #1a1a1a; border-color: var(--primary-neon); text-align: left; text-align-last: left; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Captura de Resultados Oficiales</h1>
        <p style="color: var(--primary-neon); margin: 5px 0 0 0; font-size: 13px; font-weight: bold;">VIDA GRAND SLAM — Panel de Administración</p>
        <a href="admin.html" style="color: var(--primary-neon); font-weight: bold; font-size: 12px; text-decoration: none; text-transform: uppercase; display: inline-block; margin-top: 10px;">⬅ Volver al Panel</a>
    </header>

    <div class="card">
        <form id="resultForm">
            <div class="selector-juego-group">
                <label style="color: var(--primary-neon); font-size: 12px; margin-bottom: 8px;">Seleccionar Partido Programado de la Base de Datos</label>
                <select id="partidoSelect" onchange="autocompletarPartido(this)" required>
                    <option value="" disabled selected>Cargando partidos desde el rol...</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div style="display: flex; flex-direction: column;">
                    <label>Jornada (Modificable)</label>
                    <input type="number" id="jornada" min="1" placeholder="Ej. 1" class="editable-field" required>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label>Fecha del Encuentro (Modificable)</label>
                    <input type="date" id="fecha" class="editable-field" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; text-align: center; margin-bottom: 5px;">
                <label>Equipo Local (Casa)</label><label>Carreras</label>
            </div>

            <div class="row">
                <select id="teamHome" required disabled></select>
                <input type="password" style="display:none;"><input type="number" id="scoreHome" min="0" placeholder="0" required>
                <div style="text-align: center; font-weight: bold; color: var(--primary-neon)">VS</div>
                <input type="number" id="scoreAway" min="0" placeholder="0" required>
                <select id="teamAway" required disabled></select>
            </div>

            <button type="submit">Subir Resultado a la Nube</button>
        </form>
    </div>

    <div class="card">
        <h2 style="font-size: 16px; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 8px;">Historial de Pizarras Guardadas</h2>
        <div id="listaResultados"><p style="color: var(--text-muted); text-align: center; font-style: italic;">Cargando historial...</p></div>
    </div>
</div>

<script>
    const firebasePartidosURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/partidos.json';
    const firebaseResultadosURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/resultados.json';
    const firebasePosicionesURL = 'https://vidagrandslam-default-rtdb.firebaseio.com/posiciones.json';
    
    let partidosProgramados = {};

    function inicializarFormulario() {
        cargarPartidosDelRol();
        cargarResultados();
    }

    function cargarPartidosDelRol() {
        const partidoSelect = document.getElementById('partidoSelect');
        
        fetch(firebasePartidosURL)
        .then(res => res.json())
        .then(data => {
            if (!data) {
                partidoSelect.innerHTML = '<option value="" disabled selected>No hay partidos en el rol para calificar</option>';
                return;
            }
            
            partidosProgramados = data;
            let options = '<option value="" disabled selected>-- Elige un partido para capturar resultado --</option>';
            
            Object.keys(data).forEach(id => {
                const p = data[id];
                const fechaCorta = p.date ? p.date.split('-').reverse().slice(0,2).join('/') : '';
                options += `<option value="${id}">[${fechaCorta}] ${p.home} VS ${p.away}</option>`;
            });
            
            partidoSelect.innerHTML = options;
        })
        .catch(() => {
            partidoSelect.innerHTML = '<option value="" disabled selected>Error al cargar partidos programados</option>';
        });
    }

    function autocompletarPartido(selectElement) {
        const partidoId = selectElement.value;
        const partido = partidosProgramados[partidoId];
        
        if (!partido) return;

        // Autocompleta automáticamente, pero deja los campos listos por si quieren editarlos
        document.getElementById('jornada').value = partido.jornada || 1;
        document.getElementById('fecha').value = partido.date || '';
        
        const homeSel = document.getElementById('teamHome');
        const awaySel = document.getElementById('teamAway');
        
        homeSel.innerHTML = `<option value="${partido.home}" selected>${partido.home}</option>`;
        awaySel.innerHTML = `<option value="${partido.away}" selected>${partido.away}</option>`;
        
        document.getElementById('scoreHome').value = '';
        document.getElementById('scoreAway').value = '';
        document.getElementById('scoreHome').focus();
    }

    document.getElementById('resultForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const home = document.getElementById('teamHome').value;
        const away = document.getElementById('teamAway').value;
        const sHome = parseInt(document.getElementById('scoreHome').value);
        const sAway = parseInt(document.getElementById('scoreAway').value);

        if(!home || !away) return alert("Por favor, selecciona primero un partido válido del rol.");
        if(sHome === sAway) return alert("En el Softbol/Slowpitch no existen los empates. Define un ganador por carreras.");

        const resultado = {
            jornada: document.getElementById('jornada').value,
            fecha: document.getElementById('fecha').value,
            teamHome: home, 
            scoreHome: sHome,
            teamAway: away, 
            scoreAway: sAway,
            partidoOriginalId: document.getElementById('partidoSelect').value
        };

        // Paso 1: Guardar resultado en resultados.json
        fetch(firebaseResultadosURL, { method: 'POST', body: JSON.stringify(resultado) })
        .then(() => {
            // Paso 2: Descargar posiciones actuales
            return fetch(firebasePosicionesURL);
        })
        .then(res => res.json())
        .then(posData => {
            let standings = Array.isArray(posData) ? posData : [];

            function buscarOCrearEquipo(name) {
                let equipo = standings.find(t => t.name === name);
                if (!equipo) {
                    equipo = { name, w: 0, l: 0, ca: 0, cr: 0 };
                    standings.push(equipo);
                }
                return equipo;
            }

            const eqHome = buscarOCrearEquipo(home);
            const eqAway = buscarOCrearEquipo(away);

            eqHome.ca += sHome; eqHome.cr += sAway;
            eqAway.ca += sAway; eqAway.cr += sHome;

            if (sHome > sAway) { eqHome.w += 1; eqAway.l += 1; }
            else { eqAway.w += 1; eqHome.l += 1; }

            standings.forEach(t => {
                const total = t.w + t.l;
                t.pct = total > 0 ? (t.w / total) : 0;
                t.dif = t.ca - t.cr;
            });

            standings.sort((a, b) => b.pct - a.pct || b.dif - a.dif || b.w - a.w);

            // Paso 3: Guardar posiciones actualizadas
            return fetch(firebasePosicionesURL, {
                method: 'PUT',
                body: JSON.stringify(standings)
            });
        })
        .then(() => {
            document.getElementById('resultForm').reset();
            document.getElementById('teamHome').innerHTML = '';
            document.getElementById('teamAway').innerHTML = '';
            inicializarFormulario();
            alert("¡Pizarra guardada con éxito! El Standing se ha actualizado en vivo.");
        })
        .catch(err => {
            console.error(err);
            alert("Error al actualizar el standing. Revisa la consola.");
        });
    });

    function cargarResultados() {
        fetch(firebaseResultadosURL).then(res => res.json()).then(data => {
            const container = document.getElementById('listaResultados');
            if(!data) { container.innerHTML = '<p style="color:#666; text-align:center;">No hay pizarras registradas en el torneo.</p>'; return; }
            container.innerHTML = '';
            
            Object.keys(data).reverse().forEach(id => {
                const r = data[id];
                container.innerHTML += `
                    <div class="match-item">
                        <div><b>J-${r.jornada}</b> | ${r.teamHome} <span style="color:var(--primary-neon); font-weight:bold;">${r.scoreHome}</span> - <span style="color:var(--primary-neon); font-weight:bold;">${r.scoreAway}</span> ${r.teamAway}</div>
                        <button onclick="eliminarResultado('${id}')" class="btn-delete">Eliminar</button>
                    </div>`;
            });
        });
    }

    function eliminarResultado(id) {
        if(confirm("¿Seguro que deseas eliminar esta pizarra del sistema? Las estadísticas volverán a su estado anterior.")) {
            fetch(`https://vidagrandslam-default-rtdb.firebaseio.com/resultados/${id}.json`, { method: 'DELETE' }).then(() => cargarResultados());
        }
    }

    window.onload = inicializarFormulario;
</script>
</body>
</html>
